  const CREATORS = [
    { key: 'dayana', name: 'Dayana', range: 'Reels 6–10' },
    { key: 'alejandra', name: 'Alejandra', range: 'Reels 11–15' }
  ];

  const CHECK_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  // === RENDER ===
  const content = document.getElementById('content');
  CREATORS.forEach(c => {
    const reels = REELS.filter(r => r.creator === c.key);
    const block = document.createElement('div');
    block.className = 'creator-block';
    block.dataset.creator = c.key;
    let html = `<div class="creator-title"><h2>${c.name}</h2><span class="count">${c.range}</span></div>`;
    reels.forEach(r => {
      const n = r.shots.length;
      const shotsHtml = r.shots.map((s, i) =>
        `<div class="shot" data-id="${r.num}-${i+1}"><div class="checkbox">${CHECK_SVG}</div><div class="shot-text">${s}</div></div>`
      ).join('');
      const editHtml = r.editNote ? `<div class="edit-note"><strong>Nota edición:</strong> ${r.editNote}</div>` : '';
      html += `
      <div class="reel" data-reel="${r.num}">
        <div class="reel-head">
          <span class="reel-num">REEL ${r.num}</span>
          <span class="reel-title">${r.title}</span>
          <div class="reel-meta">
            <span class="tag ${r.level}">${r.level.toUpperCase()}</span>
            <span class="tag">${r.format}</span>
            <button class="ref-btn guion-btn" onclick="event.stopPropagation(); openGuion(${r.num})">📝 Guión</button>
            <a class="ref-btn" href="${r.ref}" target="_blank" onclick="event.stopPropagation()">▶ Ref</a>
            <a class="ref-btn asana-btn" href="https://app.asana.com/0/${PROJECT_GID}/${r.asana}" target="_blank" onclick="event.stopPropagation()">✎ Asana</a>
          </div>
          <span class="reel-progress" data-reel-progress="${r.num}">0/${n}</span>
          <span class="caret">›</span>
        </div>
        <div class="reel-body">${shotsHtml}${editHtml}</div>
      </div>`;
    });
    block.innerHTML = html;
    content.appendChild(block);
  });

  const GUIONES = {};
  REELS.forEach(r => {
    GUIONES[r.num] = {
      title: `REEL ${r.num} — ${CREATORS.find(c => c.key === r.creator).name}`,
      sub: r.guion.sub,
      rows: r.guion.rows
    };
  });

  // === STATE / LOGIC ===
  const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function updateProgress() {
    const allShots = document.querySelectorAll('.shot');
    const total = allShots.length;
    const done = document.querySelectorAll('.shot.checked').length;
    const pct = total ? (done / total) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' / ' + total + ' (' + Math.round(pct) + '%)';

    document.querySelectorAll('.reel').forEach(reel => {
      const shots = reel.querySelectorAll('.shot');
      const checked = reel.querySelectorAll('.shot.checked');
      const el = reel.querySelector('[data-reel-progress]');
      el.textContent = checked.length + '/' + shots.length;
      if (checked.length === shots.length && shots.length > 0) el.classList.add('done');
      else el.classList.remove('done');
    });
  }

  document.querySelectorAll('.shot').forEach(shot => {
    const id = shot.dataset.id;
    if (state[id]) shot.classList.add('checked');
    shot.addEventListener('click', () => {
      shot.classList.toggle('checked');
      state[id] = shot.classList.contains('checked');
      save();
      updateProgress();
      applyFilter();
    });
  });

  document.querySelectorAll('.reel-head').forEach(head => {
    head.addEventListener('click', () => { head.parentElement.classList.toggle('open'); });
  });

  let currentFilter = 'all';
  function applyFilter() {
    document.querySelectorAll('.creator-block').forEach(block => {
      const creator = block.dataset.creator;
      if ((currentFilter === 'dayana' || currentFilter === 'alejandra') && creator !== currentFilter) block.style.display = 'none';
      else block.style.display = '';
    });
    document.querySelectorAll('.reel').forEach(reel => {
      if (currentFilter === 'pending') {
        const shots = reel.querySelectorAll('.shot');
        const allDone = Array.from(shots).every(s => s.classList.contains('checked'));
        reel.classList.toggle('hidden', allDone && shots.length > 0);
      } else {
        reel.classList.remove('hidden');
      }
    });
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('¿Borrar todo el progreso?')) {
      localStorage.removeItem(STORAGE_KEY);
      document.querySelectorAll('.shot.checked').forEach(s => s.classList.remove('checked'));
      Object.keys(state).forEach(k => delete state[k]);
      updateProgress();
      applyFilter();
    }
  });

  document.querySelector('.reel').classList.add('open');
  updateProgress();

  function openGuion(reelNum) {
    const data = GUIONES[reelNum];
    if (!data) return;
    document.getElementById('modalTitle').textContent = data.title;
    document.getElementById('modalSub').textContent = data.sub;
    document.getElementById('modalBody').innerHTML = data.rows.map(([cls, label, text]) =>
      `<div class="guion-row"><div class="guion-label ${cls}">${label}</div><div class="guion-text">${text}</div></div>`
    ).join('');
    document.getElementById('guionModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeGuion() {
    document.getElementById('guionModal').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeGuion(); });
</script>
